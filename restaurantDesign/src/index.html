<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Website</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="p-0 m-0 text-white bg-gradient-to-r from-gray-900 via-gray-800 to-blue-900 h-lvh bg-white overflow-hidden">
    <!-- overflow hidden helps to use only the available width i.e the scrolling is not allowed -->

    <div class="main p-4 flex w-full aspect-3/1 h-full">

        <div class="left w-3/4">

            <!-- navbar -->
            <div class="left-nav flex justify-between">
                <h1 class="font-bold italic text-3xl">Aum's Restaurant</h1>
                <form action="search"
                    class="flex items-center bg-gray-800 bg-opacity-60 border border-gray-600 rounded-lg">
                    <input type="text" name="Search" id="search" placeholder="Search" class="p-2 bg-transparent">
                    <img src="icons/search.png" alt="search" draggable="false" class="h-4 w-4 mr-2">
                </form>
            </div>

            <!-- menu -->
            <div class="items grid grid-rows-2 grid-cols-3 w-full h-full pb-10">
                <!-- menu items here             -->
            </div>

        </div>

        <div class="right w-1/4 p-4">
            right
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
